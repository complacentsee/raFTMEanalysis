name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-cpp:
    name: Build C++ (RSLinxBrowse + RSLinxHook)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build RSLinxHook (Release|Win32)
        run: msbuild RSLinxHook\RSLinxHook.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /verbosity:minimal

      - name: Build RSLinxBrowse (Release|Win32)
        run: msbuild RSLinxBrowse\RSLinxBrowse.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /verbosity:minimal

      - name: Collect binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Release | Out-Null
          Copy-Item RSLinxBrowse\Release\RSLinxBrowse.exe Release\
          Copy-Item RSLinxHook\Release\RSLinxHook.dll Release\

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cpp-binaries
          path: |
            Release/RSLinxBrowse.exe
            Release/RSLinxHook.dll

  build-viewer:
    name: Build RSLinxViewer (.NET 8)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained x86
        run: dotnet publish RSLinxViewer\RSLinxViewer.csproj -r win-x86 --self-contained -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rslinxviewer
          path: publish/

  release:
    name: Create GitHub Release
    needs: [build-cpp, build-viewer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download C++ binaries
        uses: actions/download-artifact@v4
        with:
          name: cpp-binaries
          path: release-assets/

      - name: Download RSLinxViewer
        uses: actions/download-artifact@v4
        with:
          name: rslinxviewer
          path: release-assets/viewer/

      - name: Zip RSLinxViewer
        run: zip -r release-assets/RSLinxViewer-${{ github.ref_name }}-win-x86.zip release-assets/viewer/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/RSLinxBrowse.exe
            release-assets/RSLinxHook.dll
            release-assets/RSLinxViewer-${{ github.ref_name }}-win-x86.zip
